<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<header th:replace="~{subHeader}"></header>
	<div class="content">
		<div class="left-content"></div>
		<div class="main-content">
			<h2>ログイン</h2>
			<div class="error-container" th:if="${message}">
				<p style="text-align: center; color: #9b2c2c;">[[${message}]]</p>
			</div>
			<form action="/login" method="post" class="input-form">
				<table border="1">
					<tr>
						<th>メールアドレス</th>
						<td>
							<input type="text" name="email">
						</td>
					</tr>
					<tr>
						<th>パスワード</th>
						<td>
							<input type="password" name="password">
						</td>
					</tr>
				</table>
				<button class="classic-button">ログイン</button>
			</form>
		</div>
		<div class="right-content"></div>
	</div>
	<footer th:replace="~{footer}"></footer>
</body>
</html>
