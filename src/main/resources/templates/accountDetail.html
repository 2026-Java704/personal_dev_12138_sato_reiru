<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>アカウント情報</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	<div class="content">
		<div class="left-content"></div>
		<div class="main-content">
			<div id="account-detail-info">
				<h2>アカウント情報</h2>
				<hr>
				<table border="1" th:object="${user}">
					<tr>
						<th>アカウントID</th>
						<td>[[*{id}]]</td>
					</tr>
					<tr>
						<th>名前</th>
						<td>[[*{userName}]]</td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td>[[*{email}]]</td>
					</tr>
				</table>
			</div>
			<div id="price-per-month">
				<table border="1">
					<tr>
						<th>年月</th>
						<th>収支</th>
					</tr>
					<tr th:each="month,state:${monthes}">
						<td>[[${month}]]</td>
						<td>[[${prices[state.index]}]]円</td>
					</tr>
				</table>
			</div>
		</div>
		<div class="right-content"></div>
	</div>
	<footer th:replace="~{footer}"></footer>
</body>
</html>
